apiVersion: apps/v1
kind: Deployment
metadata:
  name: abhishek-web-deployment
  labels:
    app: enterprise-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-web
  template:
    metadata:
      labels:
        app: enterprise-web
    spec:
      containers:
      - name: nginx-server
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: abhishek-web-service
spec:
  type: NodePort
  selector:
    app: enterprise-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
